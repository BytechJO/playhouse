<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>LametiePlus</title>
    <link rel="stylesheet" href="../css/jquery-ui.min.css" />
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css" />
    <style id="ui_style"></style>
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/activities.css" />
    <link rel="stylesheet" href="../css/qa/DRAGNDROP_TEXT_V2_Img.css" />
    <!-- <link rel="stylesheet" href="../css/DRAGNDROP_TEXT.css" /> -->
    <link rel="stylesheet" href="../css/unit_styles.css" />
    <script src="../js/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="../js/jquery-ui.min.js" type="text/javascript"></script>
    <script
      src="../js/bootstrap/bootstrap.bundle.min.js"
      type="text/javascript"
    ></script>
    <script
      src="../js/jquery.ui.touch-punch.min.js"
      text="text/javascript"
    ></script>
    <!-- [ Data for Header and Footer ] -->
    <script src="../js/data/templateData.js" type="text/javascript"></script>
    <!-- [ / Data for Header and Footer ] -->
    <!-- [ Data containing all activity files ] -->
    <script src="../js/data/activityList.js" type="text/javascript"></script>
    <link rel="stylesheet" href="../css/audio.css">
    <script src="../js/build/jsonRender.js"></script>
    <script
      src="../js/qa/data/DRAGNDROP_TEXT_DATA.js"
      type="text/javascript"
    ></script>
    <!-- [ / Data containing all activity files ] -->
  </head>

  <body>
    <div class="mask_parent">
      <div class="mask_left"></div>
      <div class="mask_right"></div>
    </div>
    <div class="loading">
      <div class="loader"></div>
    </div>
    <header class="fixed-top"></header>
    <div class="mainContent">
      <div class="modal fade activityResult" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
              <div class="modal-body">
                <video id="video_1" src="../videos/goodjob.mp4" preload=""></video> 
                <video id="video_2" src="../videos/tryagain.mp4" preload=""></video>
              </div>
            </div>
          </div>
        </div>
      </div>
 

      <div class="container content_wrap activity_wrap">
        <!-- screen numbering starts here  -->
        <div class="fixed-top screen_numbers_wrap"></div>
        <!-- // screen numbering ends here  -->
        <!-- activity panel content starts here  -->

        <!-- // activity panel content ends here  -->
        <!-- activity interactive area starts here  -->

        <div class="activity_area"></div>
        <!-- // activity interactive area ends here -->
      </div>
      <!-- / container content_wrap -->
    </div>
    <!-- activity panel popup starts here  -->
    <div
      class="modal fade activityCtrlPanel"
      tabindex="-1"
      role="dialog"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <!-- Modal Header -->
          <div class="modal-header">
            <div class="ctrlIcon"></div>
            <h4 class="modal-title"></h4>
            <button type="button" class="close" data-dismiss="modal">
              &times;
            </button>
          </div>
          <!-- Modal body -->
          <div class="modal-body"></div>
        </div>
      </div>
    </div>
    <!-- // activity panel popup ends here  -->
    <div
      class="sub_footer"
      style="
        background-image: url(../../imgs/footerBackGround.png);
        background-repeat: no-repeat;
        background-size: cover;
      "
    >
      <!-- activity panel popup starts here  -->
      <div
        class="modal fade activityCtrlPanel"
        tabindex="-1"
        role="dialog"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <!-- Modal Header -->
            <div class="modal-header">
              <div class="ctrlIcon"></div>
              <h4 class="modal-title"></h4>
              <button type="button" class="close" data-dismiss="modal">
                &times;
              </button>
            </div>
            <!-- Modal body -->
            <div class="modal-body"></div>
          </div>
        </div>
      </div>
      <!-- // activity panel popup ends here  -->
      <!-- the sub-footer starts here  -->
      <div class="container sub_footer_buttons_wrap"></div>
      <!-- // the sub-footer ends here  -->
    </div>
    <footer class="fixed-bottom"></footer>
    <script>
      var _mediaList = {
        image: [],
        audio: [],
        video: [],
      };
    </script>

    <script src="../js/build/template.js" type="text/javascript"></script>
    <script src="../js/build/audio.js"></script>
    <script src='../js/build/radio_build.js' type='text/javascript'></script>
    <!-- <script src="../js/main.js" type="text/javascript"></script> -->
    <script src="../js/generalfunctions.js" type="text/javascript"></script>
    <script src="../js/activities.js" type="text/javascript"></script>

    <script src="../js/qa/build/draganddrop.js" type="text/javascript"></script>
    <script src="../js/loading.js" type="text/javascript"></script>
    <script src="../js/qa/build/html.js" type="text/javascript"></script>
    <script src="../js/qa/build/drag_drop_single_column.js" type="text/javascript"></script>
    <script
      src="../js/qa/activity/validation.js"
      type="text/javascript"
    ></script>
    <script
      src="../js/qa/activity/drag_drop.js"
      type="text/javascript"
    ></script>
  </body>
</html>
