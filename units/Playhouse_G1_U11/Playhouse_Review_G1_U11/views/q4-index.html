<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Look, Circle and Write</title>

    <!-- نفس CSS imports الـ MCQ بالضبط -->
    <link rel="stylesheet" href="../css/jquery-ui.min.css" />
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css" />
    <style id="ui_style"></style>
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/unit_styles.css" />
    <link rel="stylesheet" href="../css/activities.css" />
    <link rel="stylesheet" href="../css/audio.css" />
    <!-- CSS خاص بالسؤال -->
    <link rel="stylesheet" href="../css/style-q4.css" />

    <!-- نفس JS imports الـ MCQ بالضبط -->
    <script src="../js/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="../js/jquery-ui.min.js" type="text/javascript"></script>
    <script
      src="../js/bootstrap/bootstrap.bundle.min.js"
      type="text/javascript"
    ></script>
    <script
      src="../js/jquery.ui.touch-punch.min.js"
      text="text/javascript"
    ></script>
    <script src="../js/data/templateData.js" type="text/javascript"></script>
    <script src="../js/data/activityList.js" type="text/javascript"></script>
    <script src="../js/build/jsonRender.js"></script>
  </head>

  <body>
    <div class="mask_parent">
      <div class="mask_left"></div>
      <div class="mask_right"></div>
    </div>

    <div class="loading"><div class="loader"></div></div>

    <header class="fixed-top"></header>

    <div class="mainContent">
      <!-- feedbackPopup نفس MCQ -->
      <div id="feedbackPopup" class="modal fade" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div>
              <button
                type="button"
                class="close closeFeedback"
                data-dismiss="modal"
              >
                &times;
              </button>
            </div>
            <div class="modal-body">
              <video id="video_1" src="../videos/goodjob.mp4" preload></video>
              <video id="video_2" src="../videos/tryagain.mp4" preload></video>
            </div>
          </div>
        </div>
      </div>

      <div class="container content_wrap activity_wrap">
        <div class="fixed-top screen_numbers_wrap" style="z-index: 2"></div>

        <div class="activity_buts d-none" data-buttons=""></div>

        <!-- activity area — يتبنى من buildLookCircleWriteBody() -->
        <div
          class="activity_container activity_area mx-auto"
          data-activity="standAlone"
        ></div>
      </div>
    </div>

    <!-- activity panel popup -->
    <div
      class="modal fade activityCtrlPanel"
      tabindex="-1"
      role="dialog"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div class="ctrlIcon"></div>
            <h4 class="modal-title"></h4>
            <button type="button" class="close" data-dismiss="modal">
              &times;
            </button>
          </div>
          <div class="modal-body"></div>
        </div>
      </div>
    </div>

    <div class="sub_footer">
      <div class="container sub_footer_buttons_wrap"></div>
    </div>

    <footer class="fixed-bottom"></footer>

    <script>
      var _mediaList = { image: [], audio: [], video: [] };
    </script>

    <!-- نفس script order الـ MCQ -->
    <script src="../js/build/template.js" type="text/javascript"></script>
    <script src="../js/build/audio.js"></script>
    <script src="../js/build/radio_build.js" type="text/javascript"></script>
    <script src="../js/generalfunctions.js" type="text/javascript"></script>
    <script src="../js/activities.js" type="text/javascript"></script>
    <!-- ملفات السؤال -->
    <script src="../js/data/data-q4.js" type="text/javascript"></script>
    <script src="../js/build/app-q4.js" type="text/javascript"></script>
    <script src="../js/loading.js" type="text/javascript"></script>
  </body>
</html>
