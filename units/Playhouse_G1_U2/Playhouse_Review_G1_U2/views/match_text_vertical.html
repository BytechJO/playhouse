<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Playhouse</title>
    <link rel="stylesheet" href="../css/jquery-ui.min.css" />
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css" />
    <style id="ui_style"></style>
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/unit_styles.css" />
    <link rel="stylesheet" href="../css/activities.css" />
    <!-- <link rel="stylesheet" href="../css/ARC_1_1_SB_U1_A1.css"> -->
    <link
      rel="stylesheet"
      href="../css/match_text_vertical.css"
    />
    <script src="../js/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="../js/jquery-ui.min.js" type="text/javascript"></script>
    <script
      src="../js/bootstrap/bootstrap.bundle.min.js"
      type="text/javascript"
    ></script>
    <script
      src="../js/jquery.ui.touch-punch.min.js"
      text="text/javascript"
    ></script>
    <!-- [ Data for Header and Footer ] -->
    <script src="../js/data/templateData.js" type="text/javascript"></script>
    <!-- [ / Data for Header and Footer ] -->
    <!-- [ Data containing all activity files ] -->
    <script src="../js/data/activityList.js" type="text/javascript"></script>
    <script
      src="../js/data/match_text_vertical_data.js"
      type="text/javascript"
    ></script>
    <!-- [ / Data containing all activity files ] -->
  </head>
  <body>
    <div class="mask_parent">
      <div class="mask_left"></div>
      <div class="mask_right"></div>
    </div>
    <div class="loading"><div class="loader"></div></div>
    <header class="fixed-top"></header>
    <img
      src="../../imgs/line.png"
      alt=""
      style="position: absolute; top: 80px; width: 100%; z-index: -1"
    />
    <div class="mainContent">
      <div id="feedbackPopup" class="modal fade" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
          <!-- Modal content-->
          <div
            class="modal-content"
            style="background: none; inline-size: fit-content"
          >
            <div>
              <button
                type="button"
                class="close closeFeedback"
                data-dismiss="modal"
              >
                &times;
              </button>
            </div>
            <div class="modal-body">
              <video id="video_1" src="../videos/goodjob.mp4" preload></video> 
              <video id="video_2" src="../videos/tryagain.mp4" preload></video>
              <div id="video_1">
                <img
                  src="../../imgs/goodBad/Layer 18.png"
                  id="feedback1"
                  alt=""
                  height="500px"
                  style="top: 10px; margin-left: 200px"
                />
                <img
                  src="../../imgs/goodBad/Marc.png"
                  alt=""
                  class="inLine"
                  height="500px"
                  style="
                    left: 10px;
                    top: 20px;
                    margin-left: 0;
                    position: absolute;
                  "
                />
              </div>
              <div id="video_2">
                <img
                  src="../../imgs/goodBad/Layer 17.png"
                  id="feedback1"
                  alt=""
                  height="500px"
                  style="top: 10px; margin-left: 200px"
                />
                <img
                  src="../../imgs/goodBad/Aline.png"
                  alt=""
                  class="inLine"
                  height="500px"
                  style="
                    left: 10px;
                    top: 20px;
                    margin-left: 0;
                    position: absolute;
                  "
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="container content_wrap activity_wrap">
        <!-- screen numbering starts here  -->
        <div class="fixed-top screen_numbers_wrap"></div>
        <!-- // screen numbering ends here  -->
        <!-- activity panel content starts here  -->
        <div
          class="activity_buts d-none"
          data-buttons="ccss,link,tips,homework"
        >
          <div class="ccss_content">Content here</div>
          <div class="link_content">Content here</div>
          <div class="tips_content">Content here</div>
          <div class="homework_content">Content here</div>
        </div>
        <!-- // activity panel content ends here  -->
        <div class="activity_area fill_in mx-auto"></div>
        <!-- ends here -->
      </div>
      <!-- / container content_wrap -->
    </div>
    <!-- activity panel popup starts here  -->
    <div
      class="modal fade activityCtrlPanel"
      tabindex="-1"
      role="dialog"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <!-- Modal Header -->
          <div class="modal-header">
            <div class="ctrlIcon"></div>
            <h4 class="modal-title"></h4>
            <button type="button" class="close" data-dismiss="modal">
              &times;
            </button>
          </div>
          <!-- Modal body -->
          <div class="modal-body"></div>
        </div>
      </div>
    </div>
    <!-- // activity panel popup ends here  -->
    <div class="sub_footer">
      <!-- the sub-footer starts here  -->
      <div
        class="sub_footer"
        style="
          background-image: url(../../imgs/footerBackGround.png);
          background-repeat: no-repeat;
          background-size: cover;
        "
      >
        <div class="container sub_footer_buttons_wrap"></div>
      </div>
      <!-- // the sub-footer ends here  -->
    </div>
    <footer class='fixed-bottom'></footer>
    <script>
      var _mediaList = {
        image: [],
        audio: [],
        video: [],
      };
    </script>

    <script src="../js/build/template.js" type="text/javascript"></script>
    <script src="../js/generalfunctions.js" type="text/javascript"></script>
    <!-- <script src="../js/build/fillinBuild_numberInOrder.js" type="text/javascript"></script>
    <script src="../js/activity/fillin.js" type="text/javascript"></script> -->
    <script
      src="../js/build/match_text_vertical.js"
      type="text/javascript"
    ></script>
    <script
      src="../js/activity/linedraw_version2.js"
      type="text/javascript"
    ></script>
    <script src="../js/activities.js" type="text/javascript"></script>
    <script src="../js/loading.js" type="text/javascript"></script>
  </body>
</html>
