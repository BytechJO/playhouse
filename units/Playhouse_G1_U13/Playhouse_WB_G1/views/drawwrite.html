<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>
        playhouse
    </title>
    <link rel="stylesheet" href="../css/jquery-ui.min.css">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css">
    <style id='ui_style'>
    </style>
    <link rel="stylesheet" href="../css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/unit_styles.css">
    <link rel="stylesheet" href="../css/activities.css">

    <!-- [ Activity build CSS file ] -->
    <link rel="stylesheet" href="../css/drawwrite.css">
    <!-- [ Activity build CSS file ] -->

    <script src="../js/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="../js/jquery-ui.min.js" type="text/javascript"></script>
    <script src="../js/bootstrap/bootstrap.bundle.min.js" type="text/javascript"></script>
    <script src="../js/jquery.ui.touch-punch.min.js" text="text/javascript"></script>
    <!-- [ Data for Header and Footer ] -->
    <script src="../js/data/templateData.js" type="text/javascript"></script>
    <!-- [ / Data for Header and Footer ] -->
    <!-- [ Data containing all activity files ] -->
    <script src="../js/data/activityList.js" type="text/javascript"></script>
    <link rel="stylesheet" href="../css/audio.css">
    <script src="../js/build/jsonRender.js"></script>
    <script src="../js/data/drawwrite_data.js" type="text/javascript"></script>
    <!-- [ / Data containing all activity files ] -->
</head>

<body>
    <div class="mask_parent">
        <div class="mask_left"></div>
        <div class="mask_right"></div>
    </div>
    <div class='loading'>
        <div class="loader"></div>
    </div>
    <header class='fixed-top'></header>
    <div class='mainContent'>
        <div id="feedbackPopup" class="modal fade" role="dialog">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div>
                        <button type="button" class="close closeFeedback" data-dismiss="modal">
                            &times;</button>
                    </div>
                    <div class="modal-body">
                        <video id="video_1" src="../videos/goodjob.mp4" preload></video>
                        <video id="video_2" src="../videos/tryagain.mp4" preload></video>
                    </div>
                </div>
            </div>
        </div>

        <div class="container content_wrap activity_wrap">
            <!-- screen numbering starts here  -->
            <div class='fixed-top screen_numbers_wrap' style="z-index:2;"></div>
            <!-- // screen numbering ends here  -->
            <!-- activity panel content starts here  -->
            <div class='activity_buts d-none' data-buttons='ccss,link,tips,homework'>
                <div class='ccss_content' data-height=''>W.1.8</div>
                <div class='link_content' data-height=''></div>
                <div class='tips_content' data-height=''>
                    <span class="pop_title">Draw and Write</span><br />
                    <span>Encourage your child to draw first, then write a word or short sentence about it.</span>
                </div>
                <div class='homework_content' data-height=''>
                    Ask your child to talk about the animal they drew.
                </div>
            </div>
            <!-- // activity panel content ends here  -->
            <!-- activity interactive area starts here  -->
            <div class='activity_container activity_area draw_write mx-auto' data-activity='drawwrite'>
            </div>
            <!-- // activity interactive area ends here -->
        </div><!-- / container content_wrap -->
    </div>
    <!-- activity panel popup starts here  -->
    <div class="modal fade activityCtrlPanel" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="ctrlIcon"></div>
                    <h4 class="modal-title"></h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>
    <!-- // activity panel popup ends here  -->
    <div class="sub_footer">
        <div class='container sub_footer_buttons_wrap'></div>
    </div>
    <footer class='fixed-bottom'></footer>
    <script>
        var _mediaList = {
            "image": [],
            "audio": [],
            "video": []
        };
    </script>

    <script src="../js/build/template.js" type="text/javascript"></script>
    <script src="../js/build/audio.js"></script>
    <script src='../js/build/radio_build.js' type='text/javascript'></script>
    <script src='../js/generalfunctions.js' type='text/javascript'></script>
    <script src="../js/build/drawwrite_build.js" type="text/javascript"></script>
    <script src="../js/activity/drawwrite.js" type="text/javascript"></script>
    <script src="../js/activities.js" type="text/javascript"></script>
    <script src='../js/loading.js' type='text/javascript'></script>
</body>

</html>
